name: "🐛 Bug 报告"
description: 报告扩展的功能异常、兼容性或界面问题
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 推荐通过插件自动填写

        **请优先打开 Virus Detector 的「设置 → 关于 → BUG 上报」进入本页面。**
        插件会自动填写扩展版本、浏览器、操作系统和脱敏后的近期错误日志，能显著减少来回确认信息的时间。

        如果下方“自动诊断信息”为空，说明当前页面不是从插件内打开；你仍可手动填写并提交。

  - type: dropdown
    id: type
    attributes:
      label: 问题类型
      description: 用于将报告分配给对应的维护方向；请选择最接近问题表现的一项。
      options:
        - 功能异常
        - 兼容性问题
        - 安全问题
        - 性能问题
        - 界面问题
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 用于快速判断问题范围；请简要说明发生了什么、影响了哪个功能，以及出现频率。
      placeholder: 例如：打开某网站登录页后，扩展导致登录状态失效。
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 用于让维护者在相同条件下重现问题；请从打开浏览器或页面开始，按实际操作顺序填写。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: 实际行为
      description: 用于确认错误表现；请填写界面提示、检测结果或功能状态，不要只写“无法使用”。
      placeholder: 当前实际发生了什么？请附上完整错误提示。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 用于界定正确结果；请说明在相同步骤下，扩展本应如何响应。
      placeholder: 正常情况下应该发生什么？
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 扩展版本
      description: 用于判断问题是否已在新版本修复；从插件内发起报告时会自动填写。
      placeholder: 从插件内上报时会自动填写
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: 浏览器及版本
      description: 用于定位 Chromium、Firefox 等浏览器之间的 API 和行为差异；从插件内发起时会自动填写。
      placeholder: 从插件内上报时会自动填写
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 用于定位系统通知、下载和文件处理差异；从插件内发起报告时会自动填写。
      placeholder: 从插件内上报时会自动填写
    validations:
      required: false

  - type: textarea
    id: configuration
    attributes:
      label: 自动诊断信息
      description: 用于定位扩展配置、存储状态和近期后台错误。它不替代复现步骤；从插件内打开时自动生成，内容已脱敏且可在提交前检查或删除。
      placeholder: 请优先通过插件的「设置 → 关于 → BUG 上报」自动填写此区域。
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: 补充日志或截图
      description: 用于补充自动诊断未覆盖的界面或控制台信息；可直接拖入截图，或粘贴不含账号、令牌和 Cookie 的日志。
      placeholder: 可选
    validations:
      required: false

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      description: 用于避免敏感信息公开到 GitHub；提交前请检查自动诊断、补充日志和截图。
      options:
        - label: 我已检查报告内容，确认其中不包含密码、Cookie、访问令牌或其他敏感信息。
          required: true

  - type: checkboxes
    id: duplicate
    attributes:
      label: 提交确认
      description: 用于减少重复报告，方便维护者集中跟踪同一问题。
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
